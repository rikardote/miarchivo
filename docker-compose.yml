services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: archivo_app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      TZ: America/Tijuana
    volumes:
      - .:/var/www
    ports:
      - "5175:5173"
      - "8087:8080"
    depends_on:
      - db
    networks:
      - archivo-net

  web:
    image: nginx:alpine
    container_name: archivo_web
    restart: unless-stopped
    ports:
      - "8194:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - archivo-net

  db:
    image: mysql:8.0
    container_name: archivo_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: archivo
      MYSQL_USER: rishar
      MYSQL_PASSWORD: secretpassword
    ports:
      - "3311:3306"
    volumes:
      - archivo_dbdata:/var/lib/mysql
    networks:
      - archivo-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: archivo_pma
    restart: unless-stopped
    ports:
      - "8195:80"
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
    depends_on:
      - db
    networks:
      - archivo-net

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: archivo_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - archivo-net

networks:
  archivo-net:
    driver: bridge

volumes:
  archivo_dbdata:
